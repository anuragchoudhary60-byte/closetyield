<html>

<head>

<meta charset="UTF-8">
<title>ClosetYield</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="navbar">

<div class="logo">ClosetYield</div>

<nav>

<a>Clothing</a>
<a>Footwear</a>
<a>Accessories</a>

</nav>

</header>


<section class="hero">

<h1>Rent your wardrobe</h1>
<h2>Let your extras earn for you</h2>

<p>List your fashion items or rent premium outfits for any occasion.</p>

</section>


<div class="filter-bar">

<input id="search" placeholder="Search products..." onkeyup="applyFilters()">

<select id="categoryFilter" onchange="applyFilters()">

<option value="all">All Categories</option>
<option value="Clothing">Clothing</option>
<option value="Footwear">Footwear</option>
<option value="Accessories">Accessories</option>

</select>


<select id="sizeFilter" onchange="applyFilters()">

<option value="all">All Sizes</option>

<option>S</option>
<option>M</option>
<option>L</option>

<option>6</option>
<option>7</option>
<option>8</option>
<option>9</option>
<option>10</option>

<option>Free Size</option>
<option>Standard</option>

</select>

</div>


<div class="products-container">

<div id="productGrid" class="product-grid"></div>

</div>


<footer class="footer">

<p>© 2026 ClosetYield</p>

</footer>


<button class="floating-whatsapp" onclick="openWhatsApp()">

Chat with us

</button>


<script src="script.js"></script>

</body>
</html>
