<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>ClosetYield</title>
<link rel="stylesheet" href="style.css">

</head>

<body>


<header class="navbar">

<div class="logo">
<a href="index.html">ClosetYield</a>
</div>

</header>



<div class="product-page">

<div class="product-gallery">

<img id="mainImage" class="main-image">

<div id="imageThumbnails" class="thumbnail-row"></div>

</div>



<div class="product-details">

<h2 id="productName"></h2>

<p id="productPrice"></p>

<p id="productDeposit"></p>

<p id="productSize"></p>


<label>Number of Rental Days</label>

<input type="number" id="rentalDays" value="1" min="1">


<button class="order-btn" onclick="orderNow()">

Order Now via WhatsApp

</button>



<h3>Rental Terms</h3>

<div class="terms-box">

<p>• Must be 18+</p>
<p>• Deposit refunded after inspection</p>
<p>• No self washing</p>
<p>• Late returns ₹200/day</p>
<p>• Damage may lead to deductions</p>

</div>

</div>

</div>


<script src="script.js"></script>

</body>

</html>
